# Dhara MCP Server Configuration

server_name: "dhara"

storage:
  path: ~/.local/share/dhara/dhara.dhara
  read_only: false
  backend: file

adapters:
  enable_versioning: true
  enable_health_checks: true
  max_versions_per_adapter: 10
  auto_push_on_startup: true

authentication:
  enabled: false
  method: token
  required_scopes: []
  token:
    tokens_file: null
    require_auth: true
    default_role: readonly

backups:
  enabled: false
  directory: ./backups
