# Dhara Lite Mode Configuration
# Zero-configuration development mode for local development and testing

mode: lite
server_name: "Dhara Lite (Development)"

# Storage configuration (local filesystem only)
storage:
  path: ~/.local/share/dhara/lite.dhara
  backend: file
  read_only: false

# Server configuration (localhost only for security)
host: 127.0.0.1
port: 8683

# Adapter distribution configuration
adapters:
  enable_versioning: true
  enable_health_checks: true
  max_versions_per_adapter: 10
  auto_push_on_startup: true

# Logging configuration (debug for development)
logging:
  level: DEBUG
  format: text

# Cloud storage (disabled in lite mode)
cloud_storage:
  enabled: false

authentication:
  enabled: false
  method: token
  required_scopes: []
  token:
    tokens_file: null
    require_auth: true
    default_role: readonly

backups:
  enabled: false
  directory: ./backups

# Cache configuration
cache:
  size: 10000
  shrink_threshold: 2.0
