---
# Service for dhruva server
apiVersion: v1
kind: Service
metadata:
  name: dhruva-server
  namespace: ${NAMESPACE}
  labels:
    app: dhruva
    component: server
  annotations:
    # Optional: Add service annotations for cloud providers
    # cloud.google.com/load-balancer-type: "Internal"
spec:
  type: ClusterIP  # Use LoadBalancer or NodePort for external access
  sessionAffinity: None  # Could use ClientIP for sticky sessions
  ports:
  - name: dhruva
    port: 2972
    targetPort: 2972
    protocol: TCP
    # nodePort: 32972  # Required if type=NodePort (30000-32767 range)
  selector:
    app: dhruva
    component: server

